<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英文單字卡字庫</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #333;
    }
    header {
      background: #2c5aa0;
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
    }
    header p {
      margin-top: 10px;
      font-size: 1.1em;
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }
    .grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      flex: 1;
      min-width: 300px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-align: center;
    }
    .card h2 {
      color: #2c5aa0;
    }
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
    }
    .btn-view {
      background: #28a745;
    }
    .btn-download {
      background: #007bff;
    }
    iframe {
      width: 100%;
      height: 400px;
      border: none;
      margin-top: 20px;
      border-radius: 10px;
    }
    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #2c5aa0;
      color: white;
    }
  </style>
</head>
<body>

<header>
  <h1>英文單字卡字庫</h1>
  <p>快速查詢、學習與下載你的英文單字卡</p>
</header>

<div class="container">

  <div class="grid">

    <!-- 線上瀏覽 -->
    <div class="card">
      <h2>方式一：線上瀏覽</h2>
      <p>透過 Google 試算表直接查看完整單字卡內容</p>

      <!-- 替換 YOUR_GOOGLE_SHEET_EMBED_LINK -->
      <iframe src="https://docs.google.com/spreadsheets/d/e/YOUR_GOOGLE_SHEET_EMBED_LINK/pubhtml"></iframe>

      <a class="btn btn-view" href="https://docs.google.com/spreadsheets/d/YOUR_GOOGLE_SHEET_LINK" target="_blank">
        前往完整試算表
      </a>
    </div>

    <!-- 下載 -->
    <div class="card">
      <h2>方式二：下載檔案</h2>
      <p>下載 Excel 檔案，離線使用或自行編輯</p>

      <!-- 替換 YOUR_DOWNLOAD_LINK -->
      <a class="btn btn-download" href="YOUR_DOWNLOAD_LINK">
        下載 Excel 檔 (.xlsx)
      </a>
    </div>

  </div>

</div>

<footer>
  <p>© 2026 英文單字卡字庫</p>
</footer>

</body>
</html>
